<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Werewolf Auto Game</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Kanit -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #dbeafe; /* Blue 100 */
            overflow-y: auto; /* Allow body scroll for better mobile experience */
            min-height: 100vh;
        }

        /* --- Global Scrollbar Styling (Glassmorphism Style) --- */
        ::-webkit-scrollbar {
            width: 14px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            border: 4px solid transparent;
            background-clip: content-box;
            transition: background-color 0.3s;
        }
        ::-webkit-scrollbar-thumb:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }
        * {
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
        }

        /* --- Animations --- */
        @keyframes moveSun {
            0% { transform: translateX(-50px) translateY(50px); opacity: 0; }
            20% { opacity: 1; }
            50% { transform: translateX(50vw) translateY(-20px); opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateX(calc(100vw + 50px)) translateY(50px); opacity: 0; }
        }
        @keyframes moveMoon {
            0% { transform: translateX(-20px) translateY(20px) scale(0.8); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateX(90vw) translateY(-40px) scale(1); opacity: 1; }
        }
        @keyframes flipUp {
            0% { transform: perspective(1000px) rotateX(90deg) translateY(20px); opacity: 0; }
            100% { transform: perspective(1000px) rotateX(0deg) translateY(0); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes bounceSlow {
            0%, 100% { transform: translateY(-3%); }
            50% { transform: translateY(3%); }
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 255, 255, 0.1); }
            50% { box-shadow: 0 0 25px rgba(255, 255, 255, 0.3); }
        }

        /* Credits Scrolling Animation */
        @keyframes creditsMove {
            0% { transform: translateY(100%); }
            100% { transform: translateY(-150%); }
        }

        .animate-sun-move { animation: moveSun 25s linear infinite; }
        .animate-moon-move { animation: moveMoon 30s linear infinite; }
        .animate-flip-up { animation: flipUp 1s cubic-bezier(0.2, 0.8, 0.2, 1); } 
        .animate-fade-in { animation: fadeIn 1.2s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .animate-bounce-slow { animation: bounceSlow 4s infinite ease-in-out; }
        .animate-float { animation: float 6s infinite ease-in-out; }
        .animate-pulse-glow { animation: pulseGlow 3s infinite; }
        
        /* Auto Scrolling Credits Class */
        .animate-credits {
            animation: creditsMove 20s linear infinite;
        }
        .animate-credits:hover {
            animation-play-state: paused;
        }

        /* Liquid Glass Panel Effect */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            border-left: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: -50%;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-25deg);
            pointer-events: none;
            animation: shine 8s infinite;
        }

        @keyframes shine {
            0% { left: -100%; opacity: 0; }
            10% { opacity: 1; }
            20% { left: 200%; opacity: 0; }
            100% { left: 200%; opacity: 0; }
        }

        /* Inner Content Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: rgba(255,255,255,0.15); 
            border-radius: 10px; 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

        /* Scroll Mask Fade Effect */
        .mask-fade-y {
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
        }
        
        button, input {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>

    <!-- Audio Elements -->
    <audio id="sound-werewolf" src="https://assets.mixkit.co/active_storage/sfx/1487/1487-preview.mp3"></audio>
    <audio id="sound-villager" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
    <audio id="sound-madman" src="https://assets.mixkit.co/active_storage/sfx/437/437-preview.mp3"></audio>

    <div id="app" class="min-h-screen relative flex flex-col items-center p-6 py-12 transition-colors duration-1000">
        <!-- Content will be injected here by JavaScript -->
    </div>

    <script>
        // --- GAME CONSTANTS ---
        const ROLES = {
            WEREWOLF: { id: 'werewolf', label: 'มนุษย์หมาป่า', icon: 'fa-moon', color: 'text-red-500', bg: 'bg-red-900/30', border: 'border-red-500/50', actionVerb: 'เลือกเหยื่อสังหาร' },
            VILLAGER: { id: 'villager', label: 'ชาวบ้าน', icon: 'fa-users', color: 'text-blue-400', bg: 'bg-blue-900/30', border: 'border-blue-500/50', actionVerb: 'หลับอย่างสงบ' },
            SEER: { id: 'seer', label: 'ผู้หยั่งรู้', icon: 'fa-eye', color: 'text-purple-400', bg: 'bg-purple-900/30', border: 'border-purple-500/50', actionVerb: 'เลือกตรวจดูบทบาท' },
            GUARD: { id: 'guard', label: 'ผู้พิทักษ์', icon: 'fa-shield-halved', color: 'text-green-400', bg: 'bg-green-900/30', border: 'border-green-500/50', actionVerb: 'เลือกคนที่ต้องการปกป้อง' },
            MADMAN: { id: 'madman', label: 'คนบ้า', icon: 'fa-ghost', color: 'text-pink-400', bg: 'bg-pink-900/30', border: 'border-pink-500/50', actionVerb: 'แกล้งทำตัวให้น่าสงสัย' },
        };

        // --- GAME STATE ---
        let state = {
            phase: 'SETUP', // SETUP, REVEAL, NIGHT_ACTION, DAY_RESULTS, VOTE_PASS, VOTE_ACTION, VOTE_RESULT, GAME_OVER
            players: [],
            inputValue: '',
            settings: {
                werewolves: 1,
                seer: 1,
                guard: 1,
                madman: 0,
                firstNightKill: true
            },
            dayCount: 0,
            nightActions: { guardTarget: null, werewolfTarget: null, seerTarget: null, seerResult: null },
            tempSelection: null,
            nightOrder: [],
            currentNightPlayerIndex: 0,
            voteOrder: [],
            currentVoterIndex: 0,
            votes: {},
            voteResult: null,
            nightResult: null,
            winner: null,
            currentRevealIndex: 0,
            isCardFlipped: false,
            isPassingPhone: false
        };

        // --- HELPER FUNCTIONS ---
        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function getAlivePlayers() {
            return state.players.filter(p => p.isAlive);
        }

        function getVillagerCount() {
            const totalSpecial = state.settings.werewolves + state.settings.seer + state.settings.guard + state.settings.madman;
            return Math.max(0, state.players.length - totalSpecial);
        }

        function playWinSound(winnerType) {
            document.querySelectorAll('audio').forEach(el => {
                el.pause();
                el.currentTime = 0;
            });

            let audioId = '';
            if (winnerType === 'WEREWOLF') audioId = 'sound-werewolf';
            else if (winnerType === 'VILLAGER') audioId = 'sound-villager';
            else if (winnerType === 'MADMAN') audioId = 'sound-madman';

            if (audioId) {
                const audio = document.getElementById(audioId);
                if (audio) {
                    audio.volume = 0.5;
                    audio.play().catch(e => console.log("Audio play failed (user interaction required first):", e));
                }
            }
        }

        // --- LOGIC FUNCTIONS ---
        function addPlayer() {
            const name = state.inputValue.trim();
            if (name) {
                state.players.push({ id: Date.now(), name: name, role: null, isAlive: true });
                state.inputValue = '';
                render();
            }
        }

        function removePlayer(id) {
            state.players = state.players.filter(p => p.id !== id);
            render();
        }

        function updateSetting(key, change) {
            const newVal = state.settings[key] + change;
            if (newVal >= 0) { 
                if (key === 'werewolves' && newVal < 1) return; 
                state.settings[key] = newVal;
                render();
            }
        }

        function startGameSetup() {
            const totalSpecial = state.settings.werewolves + state.settings.seer + state.settings.guard + state.settings.madman;
            const availableForVillagers = state.players.length - totalSpecial;

            if (availableForVillagers < 1) {
                alert(`จำนวนบทบาทพิเศษเยอะเกินไป! ต้องเหลือที่ว่างให้ "ชาวบ้าน" อย่างน้อย 1 คน (ตอนนี้เหลือ ${availableForVillagers})`);
                return;
            }

            let rolePool = [];
            for (let i = 0; i < state.settings.werewolves; i++) rolePool.push(ROLES.WEREWOLF);
            for (let i = 0; i < state.settings.seer; i++) rolePool.push(ROLES.SEER);
            for (let i = 0; i < state.settings.guard; i++) rolePool.push(ROLES.GUARD);
            for (let i = 0; i < state.settings.madman; i++) rolePool.push(ROLES.MADMAN);
            while (rolePool.length < state.players.length) rolePool.push(ROLES.VILLAGER);

            const shuffledRoles = shuffleArray(rolePool);
            state.players = state.players.map((player, index) => ({ ...player, role: shuffledRoles[index] }));

            state.phase = 'REVEAL';
            state.currentRevealIndex = 0;
            state.isCardFlipped = false;
            state.dayCount = 0;
            state.winner = null;
            render();
        }

        function nextReveal() {
            if (state.currentRevealIndex < state.players.length - 1) {
                state.currentRevealIndex++;
                state.isCardFlipped = false;
            } else {
                startNightPhase(1);
            }
            render();
        }

        function startNightPhase(dayOverride = null) {
            state.dayCount = dayOverride !== null ? dayOverride : state.dayCount + 1;
            state.nightActions = { guardTarget: null, werewolfTarget: null, seerTarget: null, seerResult: null };
            state.nightOrder = getAlivePlayers();
            state.currentNightPlayerIndex = 0;
            state.isPassingPhone = true;
            state.tempSelection = null;
            state.phase = 'NIGHT_ACTION';
            render();
        }

        function confirmNightAction() {
            const currentPlayer = state.nightOrder[state.currentNightPlayerIndex];
            const roleId = currentPlayer.role.id;
            const targetId = state.tempSelection;

            if (roleId === 'guard') state.nightActions.guardTarget = targetId;
            else if (roleId === 'werewolf') {
                if (targetId !== null || !state.nightActions.werewolfTarget) state.nightActions.werewolfTarget = targetId;
            } 
            else if (roleId === 'seer' && targetId) {
                state.nightActions.seerTarget = targetId;
                const target = state.players.find(p => p.id === targetId);
                state.nightActions.seerResult = target.role.label;
            }

            state.tempSelection = null;

            if (roleId === 'seer' && targetId) {
                render();
                return; 
            }

            completeNightTurn();
        }

        function completeNightTurn() {
            if (state.currentNightPlayerIndex < state.nightOrder.length - 1) {
                state.currentNightPlayerIndex++;
                state.isPassingPhone = true;
                state.tempSelection = null;
                render();
            } else {
                calculateNightResults();
            }
        }

        function calculateNightResults() {
            let deadPlayerId = null;
            let message = "รุ่งเช้ามาถึง... ";
            
            const wwTarget = state.nightActions.werewolfTarget;
            const guardTarget = state.nightActions.guardTarget;
            const isKillNight = (state.dayCount > 1 || state.settings.firstNightKill);

            if (wwTarget && isKillNight) {
                if (wwTarget === guardTarget) {
                    message += "เมื่อคืนมีการโจมตี แต่ผู้พิทักษ์ป้องกันไว้ได้!";
                } else {
                    deadPlayerId = wwTarget;
                    const deadName = state.players.find(p => p.id === deadPlayerId)?.name;
                    message += `น่าเศร้าที่ ${deadName} เสียชีวิตเมื่อคืนนี้`;
                }
            } else {
                message += "เมื่อคืนนี้เงียบสงบ ไม่มีใครเสียชีวิต";
            }

            if (deadPlayerId) {
                state.players = state.players.map(p => p.id === deadPlayerId ? { ...p, isAlive: false } : p);
            }

            state.nightResult = { deadPlayerId, message };
            state.phase = 'DAY_RESULTS';
            
            checkWinCondition();
            render();
        }

        function startSecretVoting() {
            state.voteOrder = getAlivePlayers();
            state.currentVoterIndex = 0;
            state.votes = {};
            state.voteResult = null;
            state.tempSelection = null;
            state.isPassingPhone = true;
            state.phase = 'VOTE_PASS';
            render();
        }

        function confirmVote() {
            const currentVoter = state.voteOrder[state.currentVoterIndex];
            const targetId = state.tempSelection;
            
            state.votes[currentVoter.id] = targetId;
            state.tempSelection = null;

            if (state.currentVoterIndex < state.voteOrder.length - 1) {
                state.currentVoterIndex++;
                state.isPassingPhone = true;
                state.phase = 'VOTE_PASS';
                render();
            } else {
                calculateVoteResults();
            }
        }

        function calculateVoteResults() {
            const counts = {};
            Object.values(state.votes).forEach(tId => {
                if(tId) counts[tId] = (counts[tId] || 0) + 1;
            });

            let maxVotes = 0;
            let kickedId = null;
            let tie = false;

            for (const [id, count] of Object.entries(counts)) {
                if (count > maxVotes) {
                    maxVotes = count;
                    kickedId = id;
                    tie = false;
                } else if (count === maxVotes && maxVotes > 0) {
                    tie = true;
                }
            }

            let message = "";
            
            if (tie || maxVotes === 0 || !kickedId) {
                message = "ผลโหวตเสมอ หรือไม่มีใครโหวต วันนี้ไม่มีใครถูกประหาร";
                state.players = [...state.players];
            } else {
                const kickedPlayer = state.players.find(p => p.id == kickedId);
                message = `ผลโหวตสรุปว่า ${kickedPlayer.name} ถูกประหารชีวิต! (${maxVotes} เสียง)`;
                
                if (kickedPlayer.role.id === 'madman') {
                    state.players = state.players.map(p => p.id == kickedId ? { ...p, isAlive: false } : p);
                    state.voteResult = `คนบ้า (${kickedPlayer.name}) ถูกประหารชีวิต! เขาบรรลุเป้าหมายและชนะเกมนี้!`;
                    state.winner = 'MADMAN';
                    state.phase = 'GAME_OVER';
                    playWinSound('MADMAN');
                    render();
                    return;
                }

                state.players = state.players.map(p => p.id == kickedId ? { ...p, isAlive: false } : p);
            }

            state.voteResult = message;
            state.phase = 'VOTE_RESULT';
            checkWinCondition();
            render();
        }

        function checkWinCondition() {
            const aliveWW = state.players.filter(p => p.isAlive && p.role.id === 'werewolf').length;
            const aliveVillagers = state.players.filter(p => p.isAlive && p.role.id !== 'werewolf').length;

            if (aliveWW === 0) {
                state.winner = 'VILLAGER';
                state.phase = 'GAME_OVER';
                playWinSound('VILLAGER');
            } else if (aliveWW >= aliveVillagers) {
                state.winner = 'WEREWOLF';
                state.phase = 'GAME_OVER';
                playWinSound('WEREWOLF');
            }
        }

        function resetGame() {
            state.phase = 'SETUP';
            state.players = [];
            state.dayCount = 0;
            state.winner = null;
            state.nightActions = {};
            state.votes = {};
            render();
        }

        // --- RENDER FUNCTIONS ---
        function render() {
            const app = document.getElementById('app');
            app.innerHTML = ''; 

            // Background Logic
            let bgClass = "bg-sky-100 text-slate-900";
            let bgGradient = "bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-sky-200 via-sky-100 to-white";
            let showSun = true;

            if (['SETUP', 'REVEAL', 'NIGHT_ACTION'].includes(state.phase) || state.winner === 'WEREWOLF' || state.winner === 'MADMAN') {
                bgClass = "bg-slate-950 text-blue-100";
                bgGradient = "bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black";
                showSun = false;
                if (state.winner === 'WEREWOLF') bgClass = "bg-red-950 text-red-100";
                if (state.winner === 'MADMAN') bgClass = "bg-pink-950 text-pink-100";
            }

            // Mobile-centric container alignment
            app.className = `min-h-screen relative flex flex-col justify-center items-center p-6 py-12 w-full transition-colors duration-1000 ${bgClass}`;
            
            // Background Elements
            app.innerHTML += `<div class="absolute inset-0 pointer-events-none ${bgGradient} z-0 transition-opacity duration-1000"></div>`;
            if (showSun) {
                app.innerHTML += `<div class="absolute top-10 -left-20 opacity-80 animate-sun-move pointer-events-none z-0"><i class="fa-solid fa-sun text-yellow-400 text-9xl drop-shadow-lg animate-pulse-glow"></i></div>`;
            } else {
                app.innerHTML += `<div class="absolute top-10 left-5 opacity-50 animate-moon-move pointer-events-none z-0"><i class="fa-solid fa-moon text-slate-300 text-6xl drop-shadow-lg animate-float"></i></div>`;
            }

            // Particle Effects
            if (!showSun) {
                app.innerHTML += `
                    <div class="absolute top-1/4 left-1/4 w-1 h-1 bg-white rounded-full animate-pulse opacity-50 delay-700"></div>
                    <div class="absolute top-3/4 right-1/4 w-1.5 h-1.5 bg-white rounded-full animate-pulse opacity-30 delay-200"></div>
                    <div class="absolute top-1/2 left-3/4 w-1 h-1 bg-white rounded-full animate-pulse opacity-60 delay-500"></div>
                `;
            }

            // Main Content Container
            const container = document.createElement('div');
            container.className = "relative z-10 w-full max-w-md lg:max-w-6xl flex flex-col transition-all duration-700 ease-in-out mb-10"; 
            app.appendChild(container);

            // --- PHASE RENDERING ---

            if (state.phase === 'SETUP') {
                const canStart = state.players.length >= 4;
                const villagerCount = getVillagerCount();
                
                let html = `
                    <h1 class="text-4xl font-extrabold mb-8 text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500 flex items-center gap-3 drop-shadow-lg animate-fade-in leading-relaxed justify-center animate-float lg:col-span-2">
                        <i class="fa-solid fa-moon text-purple-300"></i> Werewolf Auto
                    </h1>
                    
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 w-full items-start mb-6">
                `;

                // --- Panel 1: Add Players ---
                html += `
                    <div class="glass-panel p-6 rounded-2xl animate-flip-up backdrop-blur-xl ${state.players.length === 0 ? 'lg:col-span-2 lg:max-w-md lg:mx-auto w-full' : ''}">
                        <h2 class="text-xl font-semibold mb-4 flex items-center gap-2 text-blue-300 leading-relaxed"><i class="fa-solid fa-users"></i> 1. ลงทะเบียนผู้เล่น (${state.players.length} คน)</h2>
                        <form onsubmit="event.preventDefault(); addPlayer();" class="flex gap-2 mb-4">
                            <input type="text" id="pName" placeholder="ชื่อผู้เล่น..." class="flex-1 bg-white/10 border border-white/20 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-500 text-white placeholder-slate-400 transition-all duration-500 hover:bg-white/20" value="${state.inputValue}" oninput="state.inputValue = this.value">
                            <button type="submit" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg transition-transform active:scale-95 duration-500">เพิ่ม</button>
                        </form>
                        <div class="flex flex-wrap gap-2 max-h-40 overflow-y-auto p-1 mask-fade-y custom-scrollbar">
                            ${state.players.length === 0 ? '<span class="text-slate-500 italic pl-2">ยังไม่มีรายชื่อ...</span>' : ''}
                            ${state.players.map(p => `
                                <span class="bg-slate-800/60 border border-slate-600/50 px-3 py-1.5 rounded-full text-sm flex items-center gap-2 animate-fade-in hover:bg-slate-700/60 transition-colors">
                                    <span class="w-2 h-2 rounded-full bg-blue-400"></span> ${p.name}
                                    <button onclick="removePlayer(${p.id})" class="text-red-400 hover:text-red-300 ml-1 font-bold">×</button>
                                </span>
                            `).join('')}
                        </div>
                    </div>
                `;

                // --- Panel 2: Settings (Only if players > 0) ---
                if (state.players.length > 0) {
                    html += `
                    <div class="glass-panel p-6 rounded-2xl animate-fade-in backdrop-blur-xl" style="animation-delay: 0.2s">
                        <h2 class="text-xl font-semibold mb-4 flex items-center gap-2 text-blue-300 leading-relaxed">⚙️ 2. ตั้งค่าเกม</h2>
                        <div class="grid grid-cols-2 gap-3 text-sm mb-4">
                            <!-- Roles Controls -->

                        <p class="text-xl opacity-80 mb-10 font-light">เกมจบลงในวันที่ ${state.dayCount}</p>

                        <div class="mb-10 bg-black/40 p-6 rounded-2xl border border-white/10 shadow-inner relative overflow-hidden h-80 mask-fade-y">
                            <h3 class="font-bold mb-6 text-xl underline decoration-2 underline-offset-8 text-white/90 z-10 relative bg-slate-900/50 inline-block px-4 py-1 rounded-full backdrop-blur-md">เฉลยบทบาท</h3>
                            
                            <!-- Credits Scroll Container -->
                            <div class="animate-credits absolute top-0 left-0 w-full px-6 pb-10 flex flex-col gap-3">
                                ${state.players.map(p => `
                                    <div class="flex justify-between items-center p-4 rounded-xl bg-white/5 hover:bg-white/10 border border-white/5 transition-colors duration-500">
                                        <span class="font-bold text-lg ${p.isAlive ? 'text-white' : 'line-through opacity-50 text-slate-400'}">${p.name}</span>
                                        <span class="text-sm flex items-center gap-2 font-bold px-4 py-1.5 rounded-full bg-black/40 ${p.role.color}">
                                            <i class="fa-solid ${p.role.icon}"></i> ${p.role.label}
                                        </span>
                                    </div>
                                `).join('')}
                                <!-- Spacer at bottom for loop smoothness -->
                                <div class="h-20"></div>
                            </div>
                        </div>

                        <button onclick="resetGame()" class="w-full font-bold py-5 rounded-2xl text-2xl shadow-xl flex items-center justify-center gap-3 transition-transform active:scale-95 duration-500 ${state.winner === 'VILLAGER' ? 'bg-blue-600 hover:bg-blue-500' : (state.winner === 'MADMAN' ? 'bg-pink-600 hover:bg-pink-500' : 'bg-red-600 hover:bg-red-500')} text-white ring-4 ring-white/20">
                            <i class="fa-solid fa-rotate-left"></i> เล่นใหม่อีกครั้ง
                        </button>
                    </div>
                `;
            }
        }

        // Initial Render
        render();

    </script>
</body>
</html>
